{% include 'full_header.html' %}

<div class="se-pre-con">
    <div class="loader"></div>
</div>

<main>
    <div class="container-fluid site-width">
        
        <!-- Header -->
        <div class="row">
            <div class="col-12 align-self-center">
                <div class="sub-header mt-3 py-3 d-sm-flex w-100 rounded">
                    <div class="w-sm-100 mr-auto">
                        <h4 class="mb-0">ACR Portal</h4>
                        <p>Welcome to Annual Confidential Record Portal</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Card -->
        <div class="col-12 col-sm-12 p-0 m-0">
            <div class="card">
                <div class="card-header text-center">
                    <h4 class="text-primary">OTP Verification</h4>
                </div>

                <div class="card-body">

                    <!-- ✅ Django Messages -->
                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert 
                                {% if message.tags == 'error' %}alert-danger
                                {% elif message.tags == 'success' %}alert-success
                                {% elif message.tags == 'warning' %}alert-warning
                                {% else %}alert-info
                                {% endif %}
                                alert-dismissible fade show" role="alert">

                                {{ message }}

                                <button type="button" class="close" data-dismiss="alert">&times;</button>
                            </div>
                        {% endfor %}
                    {% endif %}

                    <!-- Form -->
                    <div class="row">
                        <div class="col-sm-4"></div>

                        <div class="col-sm-4">
                            <form method="post" action="{% url 'generate_pdf_reviewing_officer' %}" id="otp-form">
                                {% csrf_token %}

                                <input name="tagging_id" value="{{tagging_id}}" hidden>
                                <input name="flag" value="1" hidden>

                                <div class="form-group"> 
                                    <label>OTP Code :</label>
                                    <input class="form-control" name="otp" placeholder="Enter OTP">
                                </div>

                                <div class="text-center"> 
                                    <button type="submit" class="btn btn-info">
                                        Submit
                                    </button>
                                </div>

                            </form>
                        </div>

                        <div class="col-sm-4"></div>
                    </div>

                </div>
            </div>
        </div>
    </div>
</main>

{% include 'full_footer.html' %}

<script>
document.addEventListener('DOMContentLoaded', function() {
    const form = document.getElementById('otp-form');
    const loader = document.querySelector('.se-pre-con');

    form.addEventListener('submit', function() {
        loader.style.display = 'block';
    });
});
</script>
